# GRUB configuration for Server-Mine ISO

insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod ntfs
insmod ntfscomp
insmod exfat
insmod udf

set default="0"
set timeout=5

menuentry "Minecraft Server OS (Arch Linux)" --class arch --class linux {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID%
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
}

menuentry "Minecraft Server OS (Copy to RAM)" --class arch --class linux {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% copytoram=y
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
}
